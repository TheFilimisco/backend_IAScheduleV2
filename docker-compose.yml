version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: iaschedule-backend:latest
    container_name: iaschedule-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    # If you want to configure logging for production
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "10m"
    #     max-file: "3"
